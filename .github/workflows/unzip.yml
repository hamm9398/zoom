name: Unzip Project

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      # مرحله 1: چک کردن ریپو
      - uses: actions/checkout@v3

      # مرحله 2: نصب unzip در صورتی که موجود نباشه
      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      # مرحله 3: چک کردن اینکه فایل HtmlApp.zip وجود داره یا نه
      - name: Check if HtmlApp.zip exists
        run: |
          if [ ! -f "HtmlApp.zip" ]; then
            echo "Error: HtmlApp.zip not found!"
            exit 1
          fi

      # مرحله 4: استخراج فایل ZIP
      - name: Unzip HtmlApp.zip
        run: unzip -o HtmlApp.zip

      # مرحله 5: حذف فایل ZIP بعد از استخراج
      - name: Remove HtmlApp.zip
        run: rm -f HtmlApp.zip

      # مرحله 6: کامیت کردن تغییرات به ریپو
      - name: Commit extracted files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Extracted HtmlApp.zip" || echo "No changes to commit"
          git push
