name: Unzip Project

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Unzip HtmlApp
        run: |
          unzip HtmlApp.zip
          rm HtmlApp.zip

      - name: Commit extracted files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Extracted HtmlApp.zip"
          git push
